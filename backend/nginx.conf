# ======================================================================
# Nginx 配置片段 - 用于公网部署
# ======================================================================

# 1. 登录接口限流（防暴力破解）
# 在 http 块中定义限流区域
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

# 在 server 块中应用
server {
    listen 80;
    server_name YOUR_IP_OR_DOMAIN;

    # 前端静态文件
    location / {
        root /path/to/Agent/dist;
        try_files $uri $uri/ /index.html;
    }

    # 后端 API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ⭐ 登录接口限流：5次/分钟
    location /api/auth/login {
        limit_req zone=login_limit burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ⭐ 生产环境禁止访问 API 文档（双重保险）
    location ~ ^/(docs|redoc|openapi.json) {
        return 403;
    }
}

# ======================================================================
# 2. 完整的生产环境配置示例（带 HTTPS）
# ======================================================================

# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name YOUR_IP_OR_DOMAIN;
    return 301 https://$server_name$request_uri;
}

# HTTPS 配置
server {
    listen 443 ssl http2;
    server_name YOUR_IP_OR_DOMAIN;

    # SSL 证书（如果有域名）
    # ssl_certificate /path/to/cert.pem;
    # ssl_certificate_key /path/to/key.pem;

    # 如果只用 IP，可以生成自签名证书：
    # openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
    #   -keyout /etc/nginx/ssl/selfsigned.key \
    #   -out /etc/nginx/ssl/selfsigned.crt

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # 前端静态文件
    location / {
        root /path/to/Agent/dist;
        try_files $uri $uri/ /index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # 后端 API
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ⭐ 登录限流
    location /api/auth/login {
        limit_req zone=login_limit burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ⭐ 禁止访问 API 文档
    location ~ ^/(docs|redoc|openapi.json) {
        return 403;
    }

    # SSE 日志推流（需要特殊配置）
    location /api/logs/stream {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 必需配置
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
    }
}

# ======================================================================
# 3. 使用说明
# ======================================================================

# 1. 将此配置保存为 /etc/nginx/sites-available/agent
# 2. 创建软链接：ln -s /etc/nginx/sites-available/agent /etc/nginx/sites-enabled/
# 3. 测试配置：nginx -t
# 4. 重载配置：nginx -s reload

# 环境变量设置（后端 .env）：
# APP_ENV=prod
# DISABLE_DOCS_IN_PROD=true
# DEFAULT_ADMIN_PASSWORD=YourStrongPassword123!@#
# JWT_SECRET_KEY=your-secret-key-here
# CORS_ORIGINS=https://your-domain.com
